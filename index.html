    <script>
        console.log("Script reached");
        const STORAGE_KEY = 'calendar_events_v3';
        const TITLE_KEY = 'calendar_title_v1';
        const THEME_KEY = 'calendar_theme_v1';

        let eventsList = [];
        let calendarTitle = 'スケジュール一覧';
        let currentTheme = 'light';

        try {
            eventsList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            if (!Array.isArray(eventsList)) eventsList = [];
            // 古いデータにIDがない場合は自動付与（削除失敗バグの防止）
            let needsSave = false;
            eventsList.forEach(function (ev) {
                if (!ev.id) {
                    ev.id = Date.now().toString() + '_' + Math.random().toString(36).substr(2, 6);
                    needsSave = true;
                }
            });
            if (needsSave) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList));
            }
            calendarTitle = localStorage.getItem(TITLE_KEY) || 'スケジュール一覧';

            // テーマの初期化：LocalStorageにあればそれを利用、なければOS設定を優先
            const storedTheme = localStorage.getItem(THEME_KEY);
            if (storedTheme) {
                currentTheme = storedTheme;
            } else {
                currentTheme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            console.log("LocalStorage loaded successfully");
        } catch (e) {
            console.warn("LocalStorage access failed, using defaults:", e);
        }

        let viewMode = 'month'; // 'month' or 'week'
        let baseDate = new Date();
        let viewingEventId = null;

        const COLOR_CLASSES = { sky: 'c-sky', emerald: 'c-emerald', rose: 'c-rose', amber: 'c-amber', purple: 'c-purple' };
        const DEFAULT_COLOR = 'sky';

        // These will be initialized in init()
        let displayMonth, calendarGrid, calendarList;

        // ====== 時間選択の拡張機能 ======
        window.adjTime = function (id, deltaMinutes) {
            const input = document.getElementById(id);
            if (!input || input.disabled) return;

            let val = input.value;
            if (!val) {
                const now = new Date();
                val = `${String(now.getHours()).padStart(2, '0')}:00`;
            }

            let [h, m] = val.split(':').map(Number);
            let totalMinutes = h * 60 + m + deltaMinutes;

            if (totalMinutes < 0) totalMinutes = 0;
            if (totalMinutes >= 1440) totalMinutes = 1439;

            // スナップ（5分刻みに丸める）
            totalMinutes = Math.round(totalMinutes / 5) * 5;

            const newH = Math.floor(totalMinutes / 60) % 24;
            const newM = totalMinutes % 60;
            input.value = `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
            input.dispatchEvent(new Event('change'));
        };

        window.setDuration = function (minutes) {
            const startInput = document.getElementById('input-start');
            const endInput = document.getElementById('input-end');
            if (!startInput || !endInput || !startInput.value || startInput.disabled) return;

            let [h, m] = startInput.value.split(':').map(Number);
            let totalMinutes = h * 60 + m + minutes;

            if (totalMinutes >= 1440) totalMinutes = 1439;

            // スナップ（5分刻みに丸める）
            totalMinutes = Math.round(totalMinutes / 5) * 5;

            const newH = Math.floor(totalMinutes / 60) % 24;
            const newM = totalMinutes % 60;
            endInput.value = `${String(newH).padStart(2, '0')}:${String(newM).padStart(2, '0')}`;
            endInput.dispatchEvent(new Event('change'));
        };


        function fmt(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        // 初期化
        function init() {
            console.log("init started");
            baseDate = new Date(); // 初期表示を必ず現在の年・月に同期させる
            calendarGrid = document.getElementById('calendar-grid');
            calendarList = document.getElementById('calendar-list');
            console.log("DOM elements found:", !!calendarGrid, !!calendarList);

            applyTheme();
            loadTitle();

            // イベントリスナー
            const prevBtn = document.getElementById('btn-prev');
            const nextBtn = document.getElementById('btn-next');
            const todayPc = document.getElementById('btn-today-pc');
            const todayMob = document.getElementById('btn-today-mob');
            const newBtn = document.getElementById('btn-new');
            const editBtn = document.getElementById('btn-edit');

            document.getElementById('btn-prev').addEventListener('click', () => changeDate(-1));
            document.getElementById('btn-next').addEventListener('click', () => changeDate(1));
            document.getElementById('btn-today-pc').addEventListener('click', goToday);
            document.getElementById('btn-today-mob').addEventListener('click', goToday);
            document.getElementById('btn-new').addEventListener('click', () => openFormModal());

            // Header Select Listeners
            const headerYear = document.getElementById('header-year');
            const headerMonth = document.getElementById('header-month');

            // Build header options
            const curY = new Date().getFullYear();
            for (let i = curY - 10; i <= curY + 10; i++) headerYear.add(new Option(i, i));
            for (let i = 1; i <= 12; i++) headerMonth.add(new Option(i, i));

            headerYear.addEventListener('change', () => {
                baseDate.setFullYear(parseInt(headerYear.value));
                renderCalendar();
            });
            headerMonth.addEventListener('change', () => {
                baseDate.setMonth(parseInt(headerMonth.value) - 1);
                renderCalendar();
            });
            if (editBtn) editBtn.addEventListener('click', editEvent);

            const exportBtn = document.getElementById('btn-export-trigger');
            const exportModal = document.getElementById('modal-export-choose');
            console.log("exportBtn:", exportBtn);
            console.log("exportModal:", exportModal);

            // Using inline onclick for reliability, so we don't need listeners here.
            // But we still need the buttons inside the modal to work if they don't have inline.
            // Actually, I added inline onclick to the buttons too.

            // 重要：ボタン等のイベントリスナーを再登録
            // この部分が存在しなかったため、ボタンを押しても動かなくなっていました。
            document.getElementById('btn-save').addEventListener('click', saveEvent);
            document.getElementById('btn-delete').addEventListener('click', deleteEvent);
            document.getElementById('btn-theme').addEventListener('click', toggleTheme);

            document.querySelectorAll('.btn-close-form').forEach(b => b.addEventListener('click', closeFormModal));
            document.querySelectorAll('.btn-close-detail-x').forEach(b => b.addEventListener('click', closeDetailModal));
            document.getElementById('btn-close-detail-btn').addEventListener('click', closeDetailModal);

            // 終日チェックボックスの処理
            document.getElementById('input-allday').addEventListener('change', (e) => {
                const isAllDay = e.target.checked;
                const startInput = document.getElementById('input-start');
                const endInput = document.getElementById('input-end');
                const container = document.getElementById('time-inputs-container');
                const durContainer = document.getElementById('quick-durations-container');
                const adjBtns = document.querySelectorAll('.adj-btn');
                const durBtns = document.querySelectorAll('.dur-btn');

                if (isAllDay) {
                    startInput.disabled = true;
                    endInput.disabled = true;
                    container.style.opacity = '0.5';
                    if (durContainer) durContainer.style.opacity = '0.5';
                    adjBtns.forEach(b => b.disabled = true);
                    durBtns.forEach(b => b.disabled = true);
                } else {
                    startInput.disabled = false;
                    endInput.disabled = false;
                    container.style.opacity = '1';
                    if (durContainer) durContainer.style.opacity = '1';
                    adjBtns.forEach(b => b.disabled = false);
                    durBtns.forEach(b => b.disabled = false);
                }
            });

            // 開始時間を変更したときに終了時間を自動調整
            const startIn = document.getElementById('input-start');
            const endIn = document.getElementById('input-end');
            if (startIn && endIn) {
                startIn.addEventListener('change', (e) => {
                    const startVal = e.target.value;
                    if (!startVal || startIn.disabled) return;
                    // 終了時間が未入力、または開始時間より前の場合は1時間後に設定
                    if (!endIn.value || endIn.value <= startVal) {
                        let [h, m] = startVal.split(':').map(Number);
                        h += 1;
                        if (h >= 24) { h = 23; m = 59; }
                        endIn.value = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                        endIn.dispatchEvent(new Event('change'));
                    }
                });
            }

            document.getElementById('modal-form').addEventListener('click', e => { if (e.target === document.getElementById('modal-form')) closeFormModal(); });
            document.getElementById('modal-detail').addEventListener('click', e => { if (e.target === document.getElementById('modal-detail')) closeDetailModal(); });
            document.getElementById('modal-export-choose').addEventListener('click', e => { if (e.target === document.getElementById('modal-export-choose')) closeExportModal(); });

            renderCalendar();
        }

        // ====== テーマ機能 ======
        function applyTheme() {
            if (currentTheme === 'dark') {
                document.body.classList.add('dark');
                document.getElementById('btn-theme').textContent = '☀️';
            } else {
                document.body.classList.remove('dark');
                document.getElementById('btn-theme').textContent = '🌙';
            }
        }
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem(THEME_KEY, currentTheme);
            applyTheme();
        }

        // システムテーマの変更検知
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            // もしユーザーが手動でテーマを設定していなければ、システム設定に追従する
            if (!localStorage.getItem(THEME_KEY)) {
                currentTheme = event.matches ? 'dark' : 'light';
                applyTheme();
            }
        });

        // ====== タイトル編集 ======
        function loadTitle() { document.getElementById('title-label').textContent = calendarTitle; }
        function startEditTitle() {
            const titleText = document.getElementById('title-label');
            const input = document.createElement('input');
            input.type = 'text'; input.className = 'title-input'; input.value = calendarTitle; input.maxLength = 30;
            titleText.style.display = 'none';
            titleText.parentNode.insertBefore(input, titleText.nextSibling);
            input.focus(); input.select();

            const save = () => {
                calendarTitle = input.value.trim() || 'スケジュール一覧';
                localStorage.setItem(TITLE_KEY, calendarTitle);
                loadTitle();
                titleText.style.display = '';
                input.remove();
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { input.value = calendarTitle; input.blur(); }
            });
        }

        // ====== ナビゲーション ======
        function changeDate(delta) {
            baseDate.setMonth(baseDate.getMonth() + delta);
            renderCalendar();
        }
        function goToday() {
            baseDate = new Date();
            renderCalendar();
        }

        // ====== トースト通知 ======
        function showToast(message) {
            let toast = document.getElementById('toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toast';
                toast.style.position = 'fixed';
                toast.style.bottom = '24px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = 'var(--text-color)';
                toast.style.color = 'var(--bg-color)';
                toast.style.padding = '12px 24px';
                toast.style.borderRadius = '999px';
                toast.style.boxShadow = '0 10px 25px rgba(0,0,0,0.1)';
                toast.style.fontSize = '14px';
                toast.style.fontWeight = 'bold';
                toast.style.zIndex = '10000';
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.opacity = '1';

            // 既存のタイマーがあればクリア
            if (toast.hideTimer) clearTimeout(toast.hideTimer);

            toast.hideTimer = setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        // ====== モーダル・データ処理 ======
        function editEvent() {
            if (!viewingEventId) return;
            const ev = eventsList.find(e => e.id === viewingEventId);
            if (!ev) return;

            // 詳細モーダルを閉じる
            document.getElementById('modal-detail').classList.remove('show');

            // initSelects handles synchronization via dispatchEvent inside editEvent
            const evDateInput = document.getElementById('input-date');
            evDateInput.value = ev.date;
            evDateInput.dispatchEvent(new Event('change'));

            document.getElementById('input-title').value = ev.title;

            const isAllDay = ev.isAllDay || false;
            document.getElementById('input-allday').checked = isAllDay;
            // dispatch change event to update the disabled state of time inputs
            document.getElementById('input-allday').dispatchEvent(new Event('change'));

            if (!isAllDay) {
                const sIn = document.getElementById('input-start');
                const eIn = document.getElementById('input-end');
                sIn.value = ev.startTime;
                eIn.value = ev.endTime;
                sIn.dispatchEvent(new Event('change'));
                eIn.dispatchEvent(new Event('change'));
            } else {
                const sIn = document.getElementById('input-start');
                const eIn = document.getElementById('input-end');
                sIn.value = '10:00';
                eIn.value = '11:00';
                sIn.dispatchEvent(new Event('change'));
                eIn.dispatchEvent(new Event('change'));
            }

            document.getElementById('input-desc').value = ev.desc || '';
            const colorInput = document.querySelector(`input[name="event-color"][value="${ev.color}"]`);
            if (colorInput) colorInput.checked = true;

            const modal = document.getElementById('modal-form');
            modal.querySelector('h2').textContent = '予定を編集';
            modal.classList.add('show');
            setTimeout(() => document.getElementById('input-title').focus(), 100);
        }

        function openFormModal(dateStr = "") {
            viewingEventId = null; // 新規作成時はIDをリセット
            const dateIn = document.getElementById('input-date');
            dateIn.value = dateStr || fmt(new Date());
            dateIn.dispatchEvent(new Event('change'));

            document.getElementById('input-title').value = '';

            document.getElementById('input-allday').checked = false;
            document.getElementById('input-allday').dispatchEvent(new Event('change'));

            const sIn = document.getElementById('input-start');
            const eIn = document.getElementById('input-end');
            sIn.value = '10:00';
            eIn.value = '11:00';
            sIn.dispatchEvent(new Event('change'));
            eIn.dispatchEvent(new Event('change'));
            document.getElementById('input-desc').value = '';
            const def = document.querySelector(`input[name="event-color"][value="${DEFAULT_COLOR}"]`);
            if (def) def.checked = true;

            const modal = document.getElementById('modal-form');
            modal.querySelector('h2').textContent = '新しい予定を登録';
            modal.classList.add('show');
            setTimeout(() => document.getElementById('input-title').focus(), 100);
        }
        function closeFormModal() { document.getElementById('modal-form').classList.remove('show'); }

        function openDetailModal(eventId) {
            const ev = eventsList.find(e => e.id === eventId);
            if (!ev) return;
            viewingEventId = eventId;

            document.getElementById('detail-header').className = `detail-header c-${ev.color}`;
            document.getElementById('detail-title').textContent = ev.title;
            const timeDisplay = ev.isAllDay ? '終日' : `${ev.startTime} ～ ${ev.endTime}`;
            document.getElementById('detail-datetime').textContent = `${ev.date.replace(/-/g, '/')} | ${timeDisplay}`;

            const desc = document.getElementById('detail-desc');
            desc.textContent = ev.desc || '（詳細メモはありません）';
            desc.classList.toggle('empty', !ev.desc);

            document.getElementById('modal-detail').classList.add('show');
        }
        function closeDetailModal() { document.getElementById('modal-detail').classList.remove('show'); viewingEventId = null; }

        function saveEvent() {
            // ダブルタップ（連打）による重複保存を防止
            const saveBtn = document.getElementById('btn-save');
            if (saveBtn && saveBtn.disabled) return;
            if (saveBtn) saveBtn.disabled = true;

            const title = document.getElementById('input-title').value.trim();
            const date = document.getElementById('input-date').value;
            const isAllDay = document.getElementById('input-allday').checked;

            let start = document.getElementById('input-start').value;
            let end = document.getElementById('input-end').value;

            if (!title || !date) {
                alert('タイトル・日付は必須です。');
                if (saveBtn) saveBtn.disabled = false;
                return;
            }

            if (!isAllDay) {
                if (!start || !end) {
                    alert('開始時間と終了時間を入力してください。');
                    if (saveBtn) saveBtn.disabled = false;
                    return;
                }
                if (start >= end) {
                    alert('終了時間は開始時間より後にしてください。');
                    if (saveBtn) saveBtn.disabled = false;
                    return;
                }
            } else {
                // 終日の場合は時間を仮で設定し、ソート順を一番上にするため 00:00 とする
                start = '00:00';
                end = '23:59';
            }

            const colorInput = document.querySelector('input[name="event-color"]:checked');
            const color = colorInput ? colorInput.value : DEFAULT_COLOR;
            const desc = document.getElementById('input-desc').value.trim();

            if (viewingEventId) {
                // 編集（上書き更新）
                const evIndex = eventsList.findIndex(e => e.id === viewingEventId);
                if (evIndex !== -1) {
                    eventsList[evIndex] = { ...eventsList[evIndex], title, date, startTime: start, endTime: end, isAllDay, desc, color };
                }
            } else {
                // 新規追加
                eventsList.push({ id: Date.now().toString(), title, date, startTime: start, endTime: end, isAllDay, desc, color });
            }

            localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList));
            renderCalendar();
            closeFormModal();
            viewingEventId = null; // リセット
            showToast('予定を保存しました');

            // ボタンを少し遅れて再有効化（モーダルが閉じた後）
            setTimeout(() => { if (saveBtn) saveBtn.disabled = false; }, 500);
        }

        function deleteEvent() {
            if (!viewingEventId) return;
            const target = eventsList.find(e => e.id === viewingEventId);
            if (!target) return;
            if (!confirm('「' + target.title + '」を削除してもよろしいですか？')) return;
            eventsList = eventsList.filter(e => e.id !== viewingEventId);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList));
            renderCalendar();
            closeDetailModal();
            viewingEventId = null;
            showToast('予定を削除しました');
        }

        window.clickEvent = (e, id) => { e.stopPropagation(); openDetailModal(id); };
        window.clickDate = (ds) => { openFormModal(ds); };

        // ===== D&D ======
        let draggedEventId = null;
        window.dragStart = (e, id) => {
            draggedEventId = id;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', id); // 必須
            setTimeout(() => e.target.classList.add('dragging'), 0);
        };
        window.dragEnd = (e) => {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('drag-over'));
            draggedEventId = null;
        };
        window.dragOver = (e) => {
            e.preventDefault();
            e.currentTarget.classList.add('drag-over');
        };
        window.dragLeave = (e) => {
            e.currentTarget.classList.remove('drag-over');
        };
        window.dropEvent = (e, dateStr) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            if (!draggedEventId) return;

            // リスト更新
            const ev = eventsList.find(ev => ev.id === draggedEventId);
            if (ev && ev.date !== dateStr) {
                ev.date = dateStr;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList));
                renderCalendar();
            }
        };

        // ===== 描画処理 =====
        function renderCalendar() {
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth() + 1;

            // Sync Header Dropdowns
            const headerYear = document.getElementById('header-year');
            const headerMonth = document.getElementById('header-month');
            if (headerYear && headerMonth) {
                headerYear.value = year;
                headerMonth.value = month;
            }

            renderMonthView(year, month);
            renderMobileList(year, month);
        }

        function renderMonthView(year, month) {
            calendarGrid.style.gridTemplateColumns = 'repeat(7, 1fr)';
            const firstDay = new Date(year, month - 1, 1).getDay();
            const daysCount = new Date(year, month, 0).getDate();
            const todayStr = fmt(new Date());

            let html = '';
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="grid-cell empty"></div>`;
            }

            for (let day = 1; day <= daysCount; day++) {
                const dateObj = new Date(year, month - 1, day);
                const ds = fmt(dateObj);
                html += makeCell(dateObj, ds, todayStr);
            }

            const rem = (firstDay + daysCount) % 7 === 0 ? 0 : 7 - ((firstDay + daysCount) % 7);
            for (let i = 0; i < rem; i++) {
                html += `<div class="grid-cell empty"></div>`;
            }
            calendarGrid.innerHTML = html;
        }

        function makeCell(dateObj, ds, todayStr) {
            const dayOfWeek = dateObj.getDay();
            const day = dateObj.getDate();
            const isToday = ds === todayStr;

            let dayClass = 'day-normal';
            if (dayOfWeek === 0) dayClass = 'day-sun';
            if (dayOfWeek === 6) dayClass = 'day-sat';

            const events = eventsList.filter(e => e.date === ds).sort((a, b) => a.startTime.localeCompare(b.startTime));

            let evHtml = events.map(ev => {
                const cc = COLOR_CLASSES[ev.color] || COLOR_CLASSES[DEFAULT_COLOR];
                const timeText = ev.isAllDay ? '終日' : `${ev.startTime}～${ev.endTime}`;
                // draggable 追加
                return `<div class="grid-event ${cc}" draggable="true"
                    onDragStart="window.dragStart(event,'${ev.id}')"
                    onDragEnd="window.dragEnd(event)"
                    onclick="window.clickEvent(event,'${ev.id}')">
                    <div class="ev-time">${timeText}</div>
                    <div class="ev-title">${ev.title}</div>
                </div>`;
            }).join('');

            return `<div class="grid-cell${isToday ? ' today' : ''}"
                ondragover="window.dragOver(event)"
                ondragleave="window.dragLeave(event)"
                ondrop="window.dropEvent(event, '${ds}')"
                onclick="window.clickDate('${ds}')">
                <div class="day-number ${dayClass}">
                    <span${isToday ? ' class="today-circle"' : ''}>${day}</span>
                </div>
                <div class="events-area">${evHtml}</div>
            </div>`;
        }

        function renderMobileList(year, month) {
            // モバイルは常に月で表示（週表示にすると要素が少なすぎるため）
            const daysCount = new Date(year, month, 0).getDate();
            const dow = ['日', '月', '火', '水', '木', '金', '土'];
            const todayStr = fmt(new Date());
            let html = '';

            for (let day = 1; day <= daysCount; day++) {
                const d = new Date(year, month - 1, day);
                const ds = fmt(d);
                const events = eventsList.filter(e => e.date === ds).sort((a, b) => a.startTime.localeCompare(b.startTime));

                if (events.length === 0) continue; // 空の日は非表示

                let hdrColor = 'var(--text-color)';
                let dowIdx = d.getDay();
                if (dowIdx === 0) hdrColor = '#ef4444';
                if (dowIdx === 6) hdrColor = 'var(--primary)';

                let evRows = events.map(ev => {
                    const cc = COLOR_CLASSES[ev.color] || COLOR_CLASSES[DEFAULT_COLOR];
                    const timeText = ev.isAllDay ? '終日' : `${ev.startTime} ～ ${ev.endTime}`;
                    return `<div class="list-event ${cc}" onclick="window.clickEvent(event,'${ev.id}')">
                        <div class="ev-time">${timeText}</div>
                        <div class="ev-title">${ev.title}</div>
                    </div>`;
                }).join('');

                html += `<div class="list-day${ds === todayStr ? ' today' : ''}" onclick="window.clickDate('${ds}')">
                    <div class="list-day-header" style="color:${hdrColor}">
                        <span>${month}/${day} (${dow[dowIdx]}) ${ds === todayStr ? '<span class="today-badge">今日</span>' : ''}</span>
                        <span class="plus">+</span>
                    </div>
                    ${evRows}
                </div>`;
            }
            calendarList.innerHTML = html;
        }

        // ===== エクスポート用HTML生成（テーブルベース）=====
        // html2canvasが最も確実にレンダリングできる<table>を使用
        function buildCaptureContent(type) {
            var wrap = document.createElement('div');
            wrap.style.cssText = 'background-color:#ffffff; color:#1e293b; font-family:sans-serif; padding:24px; box-sizing:border-box;';
            wrap.style.width = (type === 'calendar') ? '1100px' : '700px';
            wrap.style.position = 'absolute';
            wrap.style.left = '-9999px';
            wrap.style.top = '0';

            var m = baseDate.getMonth() + 1;
            var y = baseDate.getFullYear();

            // タイトル行
            wrap.innerHTML = '<div style="font-size:20px; font-weight:bold; color:#1e293b; background-color:#ffffff; margin-bottom:16px; padding:8px 0;">' +
                y + '年 ' + m + '月 ' + calendarTitle +
                '</div>';

            if (type === 'calendar') {
                wrap.innerHTML += buildCalendarTable(y, m);
            } else {
                wrap.innerHTML += buildListTable(y, m);
            }
            return wrap;
        }

        // --- リスト形式のテーブル生成 ---
        function buildListTable(y, m) {
            var daysCount = new Date(y, m, 0).getDate();
            var dowNames = ['日', '月', '火', '水', '木', '金', '土'];
            var rows = '';
            var found = false;

            for (var day = 1; day <= daysCount; day++) {
                var d = new Date(y, m - 1, day);
                var ds = fmt(d);
                var evts = eventsList.filter(function (e) { return e.date === ds; })
                    .sort(function (a, b) { return a.startTime.localeCompare(b.startTime); });
                if (evts.length === 0) continue;
                found = true;

                var hc = '#1e293b';
                if (d.getDay() === 0) hc = '#ef4444';
                if (d.getDay() === 6) hc = '#0ea5e9';

                rows += '<tr><td colspan="2" style="background-color:#f8fafc; color:' + hc + '; font-weight:bold; font-size:14px; padding:10px 8px; border-bottom:2px solid #e2e8f0;">' +
                    m + '/' + day + ' (' + dowNames[d.getDay()] + ')' +
                    '</td></tr>';

                for (var i = 0; i < evts.length; i++) {
                    var ev = evts[i];
                    var tt = ev.isAllDay ? '終日' : (ev.startTime + ' ～ ' + ev.endTime);
                    var bg = '#f1f5f9', tc = '#1e293b';
                    if (ev.color === 'sky') { bg = '#e0f2fe'; tc = '#0369a1'; }
                    if (ev.color === 'emerald') { bg = '#d1fae5'; tc = '#047857'; }
                    if (ev.color === 'rose') { bg = '#ffe4e6'; tc = '#e11d48'; }
                    if (ev.color === 'amber') { bg = '#fef3c7'; tc = '#b45309'; }
                    if (ev.color === 'purple') { bg = '#f3e8ff'; tc = '#7e22ce'; }

                    rows += '<tr>' +
                        '<td style="background-color:' + bg + '; color:' + tc + '; font-size:12px; font-weight:bold; padding:8px; width:120px; border-bottom:1px solid #e2e8f0; vertical-align:top;">' + tt + '</td>' +
                        '<td style="background-color:' + bg + '; color:' + tc + '; font-size:14px; font-weight:bold; padding:8px; border-bottom:1px solid #e2e8f0; vertical-align:top;">' + ev.title +
                        (ev.desc ? '<br><span style="font-size:12px; font-weight:normal; color:' + tc + ';">' + ev.desc + '</span>' : '') +
                        '</td>' +
                        '</tr>';
                }
            }

            if (!found) {
                rows = '<tr><td style="background-color:#ffffff; color:#94a3b8; text-align:center; padding:40px; font-size:14px;">この月には予定がありません</td></tr>';
            }

            return '<table style="width:100%; border-collapse:collapse; background-color:#ffffff; border:1px solid #e2e8f0;">' + rows + '</table>';
        }

        // --- カレンダー形式のテーブル生成 ---
        function buildCalendarTable(y, m) {
            var firstDay = new Date(y, m - 1, 1).getDay();
            var daysCount = new Date(y, m, 0).getDate();
            var dowLabels = ['日', '月', '火', '水', '木', '金', '土'];
            var dowColors = ['#ef4444', '#1e293b', '#1e293b', '#1e293b', '#1e293b', '#1e293b', '#0ea5e9'];

            var header = '<tr>';
            for (var i = 0; i < 7; i++) {
                header += '<th style="background-color:#f0f4f8; color:' + dowColors[i] + '; font-size:13px; font-weight:bold; padding:10px 4px; text-align:center; border:1px solid #e2e8f0;">' + dowLabels[i] + '</th>';
            }
            header += '</tr>';

            var cells = '';
            var cellCount = 0;
            var dayNum = 1;

            cells += '<tr>';
            for (var blank = 0; blank < firstDay; blank++) {
                cells += '<td style="background-color:#f8fafc; border:1px solid #e2e8f0; height:100px; vertical-align:top; padding:4px;"></td>';
                cellCount++;
            }

            while (dayNum <= daysCount) {
                if (cellCount > 0 && cellCount % 7 === 0) {
                    cells += '</tr><tr>';
                }

                var dateObj = new Date(y, m - 1, dayNum);
                var ds = fmt(dateObj);
                var dow = dateObj.getDay();
                var dc = '#1e293b';
                if (dow === 0) dc = '#ef4444';
                if (dow === 6) dc = '#0ea5e9';

                var evts = eventsList.filter(function (e) { return e.date === ds; })
                    .sort(function (a, b) { return a.startTime.localeCompare(b.startTime); });

                var evContent = '';
                for (var ei = 0; ei < evts.length; ei++) {
                    var ev = evts[ei];
                    var tt = ev.isAllDay ? '終日' : (ev.startTime + '～' + ev.endTime);
                    var bg = '#e0f2fe', tc = '#0369a1';
                    if (ev.color === 'emerald') { bg = '#d1fae5'; tc = '#047857'; }
                    if (ev.color === 'rose') { bg = '#ffe4e6'; tc = '#e11d48'; }
                    if (ev.color === 'amber') { bg = '#fef3c7'; tc = '#b45309'; }
                    if (ev.color === 'purple') { bg = '#f3e8ff'; tc = '#7e22ce'; }

                    evContent += '<div style="background-color:' + bg + '; color:' + tc + '; padding:2px 4px; margin-bottom:3px; font-size:10px; line-height:1.3; border-radius:3px;">' +
                        '<span style="font-weight:bold; color:' + tc + ';">' + tt + '</span><br>' +
                        '<span style="font-weight:bold; color:' + tc + ';">' + ev.title + '</span>' +
                        '</div>';
                }

                cells += '<td style="background-color:#ffffff; border:1px solid #e2e8f0; height:100px; width:14.28%; vertical-align:top; padding:4px;">' +
                    '<div style="text-align:right; font-weight:bold; font-size:13px; color:' + dc + '; background-color:#ffffff; margin-bottom:3px;">' + dayNum + '</div>' +
                    evContent +
                    '</td>';

                dayNum++;
                cellCount++;
            }

            var lastRowRem = cellCount % 7;
            if (lastRowRem > 0) {
                for (var r = lastRowRem; r < 7; r++) {
                    cells += '<td style="background-color:#f8fafc; border:1px solid #e2e8f0; height:100px; vertical-align:top; padding:4px;"></td>';
                }
            }
            cells += '</tr>';

            return '<table style="width:100%; border-collapse:collapse; background-color:#ffffff; table-layout:fixed;">' + header + cells + '</table>';
        }

        // --- ステップ式エクスポートUI制御 ---
        let selectedExportFormat = null;
        let selectedExportLayout = null;

        window.openExportModal = function () {
            document.getElementById('modal-export-choose').classList.add('show');
            resetExportModal();
        };

        window.closeExportModal = function () {
            document.getElementById('modal-export-choose').classList.remove('show');
        };

        window.selectExportFormat = function (format) {
            selectedExportFormat = format;
            // ボタンの選択状態を視覚的に切り替え
            ['btn-fmt-image', 'btn-fmt-pdf'].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                const isActive = (id === 'btn-fmt-image' && format === 'image') || (id === 'btn-fmt-pdf' && format === 'pdf');
                btn.style.borderColor = isActive ? 'var(--primary)' : 'var(--border-color)';
                btn.style.background = isActive ? 'rgba(56, 189, 248, 0.08)' : 'var(--container-bg)';
                btn.classList.toggle('active', isActive);
            });
            checkExportReady();
        };

        window.selectExportLayout = function (layout) {
            selectedExportLayout = layout;
            ['btn-layout-cal', 'btn-layout-list'].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                const isActive = (id === 'btn-layout-cal' && layout === 'calendar') || (id === 'btn-layout-list' && layout === 'list');
                btn.style.borderColor = isActive ? 'var(--primary)' : 'var(--border-color)';
                btn.style.background = isActive ? 'rgba(56, 189, 248, 0.08)' : 'var(--container-bg)';
                btn.classList.toggle('active', isActive);
            });
            checkExportReady();
        };

        function checkExportReady() {
            const btnEx = document.getElementById('btn-execute-export');
            if (selectedExportFormat && selectedExportLayout) {
                btnEx.disabled = false;
            } else {
                btnEx.disabled = true;
            }
        }

        window.resetExportModal = function () {
            selectedExportFormat = null;
            selectedExportLayout = null;
            ['btn-fmt-image', 'btn-fmt-pdf', 'btn-layout-cal', 'btn-layout-list'].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) return;
                btn.style.borderColor = 'var(--border-color)';
                btn.style.background = 'var(--container-bg)';
                btn.classList.remove('active');
            });
            checkExportReady();
        };

        window.executeExport = function () {
            if (!selectedExportFormat || !selectedExportLayout) return;
            document.getElementById('modal-export-choose').classList.remove('show');
            if (selectedExportFormat === 'image') {
                exportAsImage(selectedExportLayout);
            } else if (selectedExportFormat === 'pdf') {
                exportAsPdf(selectedExportLayout);
            }
        };

        // --- PNG画像書き出し（dom-to-image） ---
        function exportAsImage(type = 'calendar') {
            const btn = document.getElementById('btn-export-trigger');
            if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }

            const capture = buildCaptureContent(type);
            // 画面内に配置して描画させる（画面外だとdom-to-imageが描画できない）
            capture.style.position = 'fixed';
            capture.style.left = '0';
            capture.style.top = '0';
            capture.style.zIndex = '99999';
            capture.style.opacity = '1';
            document.body.appendChild(capture);

            const m = baseDate.getMonth() + 1;
            const y = baseDate.getFullYear();

            setTimeout(function () {
                var scale = 2;
                var origW = capture.scrollWidth;
                var origH = capture.scrollHeight;
                domtoimage.toPng(capture, {
                    width: origW * scale,
                    height: origH * scale,
                    style: {
                        transform: 'scale(' + scale + ')',
                        transformOrigin: 'top left'
                    }
                })
                    .then(function (dataUrl) {
                        var link = document.createElement('a');
                        link.download = 'schedule_' + y + '_' + String(m).padStart(2, '0') + '_' + type + '.png';
                        link.href = dataUrl;
                        link.click();
                        cleanupCapture(capture, btn);
                    })
                    .catch(function (err) {
                        console.error('PNG Export Failed:', err);
                        alert('画像の書き出しに失敗しました。もう一度お試しください。');
                        cleanupCapture(capture, btn);
                    });
            }, 300);
        }

        // --- PDF書き出し（dom-to-image → jsPDF） ---
        function exportAsPdf(type = 'list') {
            const btn = document.getElementById('btn-export-trigger');
            if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }

            const capture = buildCaptureContent(type);
            capture.style.position = 'fixed';
            capture.style.left = '0';
            capture.style.top = '0';
            capture.style.zIndex = '99999';
            capture.style.opacity = '1';
            document.body.appendChild(capture);

            const m = baseDate.getMonth() + 1;
            const y = baseDate.getFullYear();
            const orientation = type === 'calendar' ? 'landscape' : 'portrait';

            setTimeout(function () {
                var scale = 2;
                var origW = capture.scrollWidth;
                var origH = capture.scrollHeight;
                domtoimage.toPng(capture, {
                    width: origW * scale,
                    height: origH * scale,
                    style: {
                        transform: 'scale(' + scale + ')',
                        transformOrigin: 'top left'
                    }
                })
                    .then(function (dataUrl) {
                        var imgWidth = origW;
                        var imgHeight = origH;

                        // A4サイズ（mm）に合わせて画像を縮小
                        var pdf = new jspdf.jsPDF({ orientation: orientation, unit: 'mm', format: 'a4' });
                        var pageWidth = pdf.internal.pageSize.getWidth();
                        var pageHeight = pdf.internal.pageSize.getHeight();
                        var margin = 10;
                        var maxW = pageWidth - margin * 2;
                        var maxH = pageHeight - margin * 2;

                        var ratio = Math.min(maxW / imgWidth, maxH / imgHeight);
                        var w = imgWidth * ratio;
                        var h = imgHeight * ratio;

                        pdf.addImage(dataUrl, 'PNG', margin, margin, w, h);
                        pdf.save('schedule_' + y + '_' + String(m).padStart(2, '0') + '_' + type + '.pdf');
                        cleanupCapture(capture, btn);
                    })
                    .catch(function (err) {
                        console.error('PDF Export Failed:', err);
                        alert('PDFの書き出しに失敗しました。もう一度お試しください。');
                        cleanupCapture(capture, btn);
                    });
            }, 300);
        }
        function cleanupCapture(capture, btn) {
            capture.remove();
            document.body.classList.remove('exporting');
            if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
        }

        function renderCaptureList(capture, y, m) {
            capture.style.width = '800px';
            const daysCount = new Date(y, m, 0).getDate();
            const dowNames = ['日', '月', '火', '水', '木', '金', '土'];
            let hasEvents = false;

            for (let day = 1; day <= daysCount; day++) {
                const d = new Date(y, m - 1, day);
                const ds = fmt(d);
                const events = eventsList.filter(e => e.date === ds).sort((a, b) => a.startTime.localeCompare(b.startTime));
                if (events.length === 0) continue;

                hasEvents = true;
                let hdrColor = '#1e293b';
                if (d.getDay() === 0) hdrColor = '#ef4444';
                if (d.getDay() === 6) hdrColor = '#0ea5e9';

                const dayDiv = document.createElement('div');
                dayDiv.style.cssText = 'padding:12px 0; border-bottom:1px solid #e2e8f0; background-color:#ffffff;';

                // ★ シンプルなスタイルで文字色を全要素に明示的に指定
                let eventsHtml = events.map(ev => {
                    const timeText = ev.isAllDay ? '終日' : `${ev.startTime} ～ ${ev.endTime}`;
                    let bg = '#f1f5f9', border = '#cbd5e1', textColor = '#1e293b';
                    if (ev.color === 'sky') { bg = '#e0f2fe'; border = '#bae6fd'; textColor = '#0369a1'; }
                    if (ev.color === 'emerald') { bg = '#d1fae5'; border = '#a7f3d0'; textColor = '#047857'; }
                    if (ev.color === 'rose') { bg = '#ffe4e6'; border = '#fecdd3'; textColor = '#e11d48'; }
                    if (ev.color === 'amber') { bg = '#fef3c7'; border = '#fde68a'; textColor = '#b45309'; }
                    if (ev.color === 'purple') { bg = '#f3e8ff'; border = '#e9d5ff'; textColor = '#7e22ce'; }

                    return '<div style="background-color:' + bg + '; border:1px solid ' + border + '; border-radius:6px; padding:8px 12px; margin-bottom:6px;">' +
                        '<div style="font-weight:700; font-size:12px; margin-bottom:2px; color:' + textColor + ';">' + timeText + '</div>' +
                        '<div style="font-weight:700; font-size:15px; color:' + textColor + ';">' + ev.title + '</div>' +
                        (ev.desc ? '<div style="font-size:12px; margin-top:2px; color:' + textColor + ';">' + ev.desc + '</div>' : '') +
                        '</div>';
                }).join('');

                dayDiv.innerHTML = '<div style="font-size:15px; font-weight:700; margin-bottom:8px; color:' + hdrColor + '; background-color:#ffffff;">' + m + '/' + day + ' (' + dowNames[d.getDay()] + ')</div>' + eventsHtml;
                capture.appendChild(dayDiv);
            }

            if (!hasEvents) {
                capture.innerHTML += '<div style="text-align:center; color:#94a3b8; padding:40px 0; font-size:15px; background-color:#ffffff;">この月には予定がありません</div>';
            }
        }

        function renderCaptureCalendarGrid(capture, y, m) {
            capture.style.width = '1200px';
            const gridContainer = document.createElement('div');
            gridContainer.style.cssText = 'display:block; background-color:#ffffff; border-radius:12px; border:1px solid #e2e8f0;';

            const firstDay = new Date(y, m - 1, 1).getDay();
            const daysCount = new Date(y, m, 0).getDate();

            // ★ 曜日ヘッダー（シンプルなdiv並び）
            let html = '<div style="background-color:#f8fafc; border-bottom:1px solid #e2e8f0; font-weight:bold; font-size:14px; display:flex;">';
            const dowLabels = ['日', '月', '火', '水', '木', '金', '土'];
            const dowColors = ['#ef4444', '#1e293b', '#1e293b', '#1e293b', '#1e293b', '#1e293b', '#0ea5e9'];
            for (let i = 0; i < 7; i++) {
                html += '<div style="width:14.285%; padding:12px 0; text-align:center; color:' + dowColors[i] + '; box-sizing:border-box; background-color:#f8fafc;' + (i < 6 ? ' border-right:1px solid #e2e8f0;' : '') + '">' + dowLabels[i] + '</div>';
            }
            html += '</div>';

            // ★ カレンダーセル（シンプルなblockレイアウト、flexboxは使わない）
            html += '<div style="display:flex; flex-wrap:wrap; border-left:1px solid #e2e8f0; border-top:1px solid #e2e8f0; background-color:#e2e8f0;">';

            for (let i = 0; i < firstDay; i++) {
                html += '<div style="width:14.285%; min-height:120px; background-color:#f8fafc; border-right:1px solid #e2e8f0; border-bottom:1px solid #e2e8f0; box-sizing:border-box;"></div>';
            }

            for (let day = 1; day <= daysCount; day++) {
                const dateObj = new Date(y, m - 1, day);
                const ds = fmt(dateObj);
                const dow = dateObj.getDay();
                let dayColor = '#1e293b';
                if (dow === 0) dayColor = '#ef4444';
                if (dow === 6) dayColor = '#0ea5e9';

                const events = eventsList.filter(e => e.date === ds).sort((a, b) => a.startTime.localeCompare(b.startTime));

                // ★ 各予定をシンプルな構造で生成（全要素に明示的にcolorとbackground-colorを指定）
                let evHtml = '';
                for (let ei = 0; ei < events.length; ei++) {
                    const ev = events[ei];
                    const timeText = ev.isAllDay ? '終日' : ev.startTime + '～' + ev.endTime;
                    let bg = '#e0f2fe', bdr = '#bae6fd', tc = '#0369a1';
                    if (ev.color === 'emerald') { bg = '#d1fae5'; bdr = '#a7f3d0'; tc = '#047857'; }
                    if (ev.color === 'rose') { bg = '#ffe4e6'; bdr = '#fecdd3'; tc = '#e11d48'; }
                    if (ev.color === 'amber') { bg = '#fef3c7'; bdr = '#fde68a'; tc = '#b45309'; }
                    if (ev.color === 'purple') { bg = '#f3e8ff'; bdr = '#e9d5ff'; tc = '#7e22ce'; }

                    evHtml += '<div style="background-color:' + bg + '; border:1px solid ' + bdr + '; border-radius:4px; padding:4px 6px; margin-bottom:4px; font-size:11px; line-height:1.3;">' +
                        '<div style="font-weight:700; font-size:10px; color:' + tc + ';">' + timeText + '</div>' +
                        '<div style="font-weight:700; font-size:11px; color:' + tc + ';">' + ev.title + '</div>' +
                        '</div>';
                }

                // ★ セル本体（display:blockでシンプルに、overflowなし）
                html += '<div style="width:14.285%; min-height:120px; padding:6px; background-color:#ffffff; border-right:1px solid #e2e8f0; border-bottom:1px solid #e2e8f0; box-sizing:border-box;">' +
                    '<div style="text-align:right; font-weight:700; font-size:13px; color:' + dayColor + '; margin-bottom:4px; background-color:#ffffff;">' + day + '</div>' +
                    evHtml +
                    '</div>';
            }

            const rem = (firstDay + daysCount) % 7 === 0 ? 0 : 7 - ((firstDay + daysCount) % 7);
            for (let i = 0; i < rem; i++) {
                html += '<div style="width:14.285%; min-height:120px; background-color:#f8fafc; border-right:1px solid #e2e8f0; border-bottom:1px solid #e2e8f0; box-sizing:border-box;"></div>';
            }
            html += '</div>';
            gridContainer.innerHTML = html;
            capture.appendChild(gridContainer);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            console.log("DOMContentLoaded already fired, calling init directly");
            init();
        }
    </script>
</body>
